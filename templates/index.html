<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BiblioWeb</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo"><i class="fas fa-book"></i><span>BiblioWeb</span></div>
        <nav><button class="nav-btn active" data-tab="livres"><i class="fas fa-list"></i> Livres</button>
        <button class="nav-btn" data-tab="chat"><i class="fas fa-robot"></i> Chatbot</button>
        <button class="nav-btn" data-tab="config"><i class="fas fa-cog"></i> API</button></nav>
    </aside>
    <main class="content">
        <!-- Vue Livres -->
        <div id="livres-tab" class="tab active">
            <div class="toolbar"><input type="text" id="searchInput" placeholder="Rechercher..."><button id="searchBtn"><i class="fas fa-search"></i></button><button id="resetBtn">Réinitialiser</button></div>
            <div class="table-container"><table id="livres-table"><thead><tr><th>ID</th><th>Titre</th><th>Auteur</th><th>Catégorie</th><th>Année</th><th>Qté</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="table-body"></tbody></table></div>
            <div class="form-panel"><h3>Ajouter / Modifier</h3><div class="form-grid"><input type="text" id="titre" placeholder="Titre"><input type="text" id="auteur" placeholder="Auteur"><input type="text" id="categorie" placeholder="Catégorie"><input type="number" id="annee" placeholder="Année"><input type="number" id="quantite" placeholder="Quantité"><select id="statut"><option>disponible</option><option>emprunté</option><option>réservé</option></select></div><div class="form-actions"><button id="addBtn">Ajouter</button><button id="updateBtn">Modifier</button><button id="deleteBtn">Supprimer</button><button id="clearBtn">Vider</button></div><p id="formMsg"></p></div>
        </div>
        <!-- Vue Chatbot -->
        <div id="chat-tab" class="tab"><div class="chat-container"><div id="chat-messages" class="chat-messages"></div><div class="chat-input-area"><input type="text" id="question" placeholder="Posez votre question..."><button id="sendBtn">Envoyer</button></div><div class="examples"><span>Exemples :</span><button class="example-btn">Livres disponibles</button><button class="example-btn">Livre ID 1</button><button class="example-btn">Livres de Victor Hugo</button></div></div></div>
        <!-- Vue Config -->
        <div id="config-tab" class="tab"><div class="config-card"><label>Clé API Gemini</label><input type="password" id="apiKey" placeholder="AIza..."><button id="saveKeyBtn">Sauvegarder</button><p id="apiStatus"></p></div></div>
    </main>
</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
